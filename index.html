<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/favi.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#103f6b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="description"
      content="Force Intellect provides robust and affordable ERP software for manufacturing SMEs. Spectrum ERP automates material management, production, finance, HR, and more."
    />
    <meta
      name="keywords"
      content="ERP, Manufacturing ERP, Spectrum ERP, Force Intellect, SME ERP, India"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="preload"
      as="image"
      href="/images/hero/ForceIntellect-Slider-01.webp"
      imagesrcset="/images/hero/ForceIntellect-Slider-01-480.webp 480w, /images/hero/ForceIntellect-Slider-01-640.webp 640w, /images/hero/ForceIntellect-Slider-01-1280.webp 1280w, /images/hero/ForceIntellect-Slider-01.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <title>Force Intellect | ERP for Manufacturing SMEs</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('fi-theme');
          var dark =
            stored === 'dark' ||
            (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
